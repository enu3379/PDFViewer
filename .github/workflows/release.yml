name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify extension package contents
        run: |
          test -f dist/manifest.json
          test -f dist/sw.js
          test -f dist/viewer.html
          test -f dist/hub.html

      - name: Package dist
        shell: bash
        run: |
          tag_name="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag_name="${{ inputs.tag }}"
          fi

          archive="margin-extension-${tag_name}.zip"
          (cd dist && zip -r "../${archive}" .)

          echo "TAG_NAME=${tag_name}" >> "${GITHUB_ENV}"
          echo "ARCHIVE=${archive}" >> "${GITHUB_ENV}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Chrome MV3 extension package built from dist/. Download the zip, unzip it, then load the folder as an unpacked extension from chrome://extensions."
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${ARCHIVE}" --clobber
          else
            gh release create "${TAG_NAME}" "${ARCHIVE}" \
              --target "${GITHUB_SHA}" \
              --title "Margin ${TAG_NAME}" \
              --notes "${notes}"
          fi
